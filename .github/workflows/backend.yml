# ==============================================================================
# BACKEND CI/CD WORKFLOW
#
# PURPOSE:
#   Independent pipeline for the backend Node.js/Express API.
#   Runs dependency vulnerability scans, linting, Jest unit/integration tests
#   with 75% coverage threshold, Karate API tests, K6 performance tests,
#   builds the Docker image locally, scans it with Trivy before pushing,
#   and deploys to Render.
#
# DESIGN DECISIONS:
#   - Isolated from frontend — only triggers when backend code changes.
#   - Uses `!` negation patterns to skip doc/non-code file changes.
#   - npm audit blocks on Critical/High CVEs; lower severities are reported.
#   - Jest enforces 75% coverage threshold across all categories.
#   - A PostgreSQL service container is spun up for integration/API tests.
#   - Karate API tests clone and run against the local backend instance.
#   - K6 performance tests clone and run load scenarios against the API.
#   - Docker image is built locally and scanned with Trivy BEFORE pushing.
#   - Critical/High Docker vulnerabilities block the push automatically.
#   Deploy calls the Render REST API directly via curl to trigger a
#   redeployment of the Docker image service and polls until live.
# ==============================================================================

name: Backend CI/CD

# ──────────────────────────────────────────────────────────────────────────────
# TRIGGERS
# ──────────────────────────────────────────────────────────────────────────────
# Runs on push/PR to main, develop, and feature/** branches.
# Only triggers when backend CODE files or this workflow file are modified.
#
# The `!` negation patterns ensure that documentation and non-code files
# (.md, .txt, .pdf, images, logs) do NOT trigger this workflow,
# even if those files are inside the HEALTH_TECH_BACKEND/ directory.
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
    paths:
      - "HEALTH_TECH_BACKEND/**"
      - ".github/workflows/backend.yml"
      # ── Exclude documentation / non-code files ──
      - "!**/*.md"
      - "!**/*.txt"
      - "!**/*.pdf"
      - "!**/*.png"
      - "!**/*.jpg"
      - "!**/*.jpeg"
      - "!**/*.gif"
      - "!**/*.svg"
      - "!**/*.log"

  pull_request:
    branches:
      - main
      - develop
      - "feature/**"
    paths:
      - "HEALTH_TECH_BACKEND/**"
      - ".github/workflows/backend.yml"
      # ── Exclude documentation / non-code files ──
      - "!**/*.md"
      - "!**/*.txt"
      - "!**/*.pdf"
      - "!**/*.png"
      - "!**/*.jpg"
      - "!**/*.jpeg"
      - "!**/*.gif"
      - "!**/*.svg"
      - "!**/*.log"

# ──────────────────────────────────────────────────────────────────────────────
# GLOBAL ENVIRONMENT VARIABLES
# ──────────────────────────────────────────────────────────────────────────────
env:
  NODE_VERSION: "20"
  BACKEND_IMAGE: ${{ secrets.DOCKER_USER }}/health-tech-backend
  BACKEND_PORT: 3000

jobs:
  # ============================================================================
  # JOB 1 — TEST & VULNERABILITY SCAN
  # ============================================================================
  # Scans npm dependencies for CVEs and runs Jest unit/integration tests with a
  # 75% coverage threshold. A PostgreSQL service container is included for
  # tests that need a live database. Critical/High dependency vulnerabilities
  # block the job. Coverage below 75% blocks the job; the report is always
  # uploaded.
  # ============================================================================
  test:
    name: "Test & Vulnerability Scan"
    runs-on: ubuntu-latest

    permissions:
      contents: read # Read repository source code
      pull-requests: read # # Read PR metadata
      security-events: write

    # ── PostgreSQL service container for integration and API tests ────────────
    # Provides a local database instance matching production schema.
    # The backend, Karate, and K6 tests connect to this container via
    # localhost:5432 (the runner maps the container port automatically).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ secrets.TEST_DB_NAME }}
          POSTGRES_USER: ${{ secrets.TEST_DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # -- Checkout source code -----------------------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -- Setup Node.js with npm dependency caching --------------------------
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: HEALTH_TECH_BACKEND/package-lock.json

      # -- Install exact dependency versions from lockfile --------------------
      - name: Install Dependencies
        working-directory: ./HEALTH_TECH_BACKEND
        run: npm ci

      # -- Dependency Vulnerability Scan (npm audit) --------------------------
      # Generates a full JSON report for archival, then re-runs the audit
      # with --audit-level=high to gate the pipeline on Critical/High CVEs.
      # Moderate / Low / Info findings are captured in the report but do NOT
      # stop the pipeline.
      - name: Dependency Vulnerability Scan (npm audit)
        working-directory: ./HEALTH_TECH_BACKEND
        run: |
          echo "Running npm audit — dependency vulnerability scan..."
          npm audit --json > npm-audit-report.json || true
          npm audit --audit-level=high || {
            echo "::error::Critical/High vulnerabilities found in npm dependencies. Review npm-audit-report.json for details."
            exit 1
          }
          echo "No critical or high vulnerabilities detected in dependencies."

      # -- Upload npm audit report (14 days, always) --------------------------
      - name: Upload npm Audit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-npm-audit-report
          path: HEALTH_TECH_BACKEND/npm-audit-report.json
          retention-days: 14

      # -- Code Quality Check (ESLint) ----------------------------------------
      # Lint errors are reported to the log but do NOT block the pipeline.
      # Requires eslint to be configured in the backend project.
      - name: Code Quality Check (ESLint)
        working-directory: ./HEALTH_TECH_BACKEND
        run: npx eslint . --ext .js
        continue-on-error: true

      # -- Unit & Integration Tests with 75% coverage threshold ---------------
      # Uses Jest. The pipeline fails if any coverage category (lines,
      # functions, branches, statements) drops below 75%.
      # The coverage report is generated for archival.
      - name: Run Unit & Integration Tests
        working-directory: ./HEALTH_TECH_BACKEND
        env:
          DATABASE_URL: postgresql://${{ secrets.TEST_DB_USER }}:${{ secrets.TEST_DB_PASSWORD }}@localhost:5432/${{ secrets.TEST_DB_NAME }}
          NODE_ENV: test
        run: |
          npx jest --coverage \
            --coverageThreshold='{"global":{"lines":75,"functions":75,"branches":75,"statements":75}}'

      # -- Upload coverage report (3 days, always) ----------------------------
      # Always uploaded so failed runs can still be inspected for coverage gaps.
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: HEALTH_TECH_BACKEND/coverage/
          retention-days: 3

  # ============================================================================
  # JOB 2 — DOCKER BUILD & VULNERABILITY SCAN
  # ============================================================================
  # Builds the Docker image locally and loads it into the runner's daemon.
  # Saves the image as a TAR artifact for traceability.
  # Trivy scans the saved TAR for vulnerabilities — Critical/High findings
  # block the push. The SARIF report is always generated and uploaded.
  # Only if the scan passes does the image get pushed to Docker Hub.
  # ============================================================================
  docker-build:
    name: "Docker Build & Vulnerability Scan"
    needs: [test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      # -- Checkout source code -----------------------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -- Extract short SHA for image tagging --------------------------------
      - name: Generate Short SHA
        id: short-sha
        run: echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      # -- Setup Docker Buildx ------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -- Build Docker Image (local only, no push) ---------------------------
      # Image is loaded into the local Docker daemon so it can be saved
      # as a TAR file and scanned by Trivy before any registry interaction.
      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./HEALTH_TECH_BACKEND
          file: ./HEALTH_TECH_BACKEND/Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.short-sha.outputs.sha_short }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -- Save Docker Image as TAR and upload as artifact --------------------
      # Archives the image before any push. This provides an immutable
      # snapshot of exactly what was scanned and (if passing) pushed.
      - name: Save Docker Image as TAR
        run: |
          docker save ${{ env.BACKEND_IMAGE }}:${{ steps.short-sha.outputs.sha_short }} \
            -o backend-image-${{ steps.short-sha.outputs.sha_short }}.tar

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-docker-image-${{ steps.short-sha.outputs.sha_short }}
          path: backend-image-${{ steps.short-sha.outputs.sha_short }}.tar
          retention-days: 1

      # -- Docker Image Vulnerability Scan (Trivy) ----------------------------
      # Scans the saved TAR file for OS-package and library CVEs.
      # exit-code: '1' causes this step to fail — and halt the job — if any
      # Critical or High vulnerabilities are found, preventing the push.
      - name: Docker Image Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          input: backend-image-${{ steps.short-sha.outputs.sha_short }}.tar
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      # -- Generate Trivy SARIF Report ----------------------------------------
      # Always runs so scan evidence is preserved even when the previous step
      # detected violations. exit-code: '0' ensures this step never fails.
      - name: Generate Trivy SARIF Report
        uses: aquasecurity/trivy-action@0.35.0
        if: always()
        with:
          input: backend-image-${{ steps.short-sha.outputs.sha_short }}.tar
          format: "sarif"
          output: "trivy-backend-results.sarif"
          exit-code: "0"
          severity: "CRITICAL,HIGH,MEDIUM"
          ignore-unfixed: true

      # -- Upload Trivy SARIF report (14 days, always) ------------------------
      - name: Upload Trivy Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-backend-report
          path: trivy-backend-results.sarif
          retention-days: 14

      # -- Push Docker Image to Docker Hub ------------------------------------
      # These two steps only execute if the Trivy scan passed (no Critical/High
      # findings). GitHub Actions skips subsequent steps after any failing step
      # unless `if: always()` is explicitly set.
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ steps.short-sha.outputs.sha_short }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

  # ============================================================================
  # JOB 3 — KARATE API TESTS
  # ============================================================================
  # Clones the Karate DSL QA repository and runs API tests against the backend.
  # The test environment (PostgreSQL + backend) is spun up via docker-compose
  # using the Docker image published in the docker-build job. Karate generates
  # an HTML report in build/karate-reports, which is uploaded as an artifact
  # retained 14 days. Any test failure stops the pipeline before deployment.
  # ============================================================================
  karate-test:
    name: "Karate API Tests"
    needs: [docker-build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read # Read repository source code

    steps:
      # -- Checkout main repository (provides docker-compose.yml) ------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -- Create .env file for docker-compose test environment --------------
      # DB_HOST=db and DB_PORT=5432 target the PostgreSQL container via the
      # internal Docker network. The backend is reachable from the runner
      # at localhost:3000 (mapped port) for Karate to target.
      - name: Create .env File
        run: |
          cat > .env << 'EOF'
          DB_USER=postgres
          DB_HOST=db
          DB_PASSWORD=${{ secrets.TEST_DB_PASSWORD }}
          DB_NAME=Triage
          DB_PORT=5432
          STAGE=test
          CORS_ORIGIN=http://localhost:5173,http://localhost:5174
          VITE_API_PROTOCOL=http
          VITE_API_HOST=localhost
          VITE_API_PORT=3000
          EOF

      # -- Login to Docker Hub to pull published images ----------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -- Start database and backend via docker compose ---------------------
      # Only the db and backend services are required for API tests.
      - name: Start Test Environment (docker compose up)
        run: docker compose up -d db backend

      # -- Verify database is healthy ----------------------------------------
      - name: Verify Database is Healthy
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          for i in $(seq 1 30); do
            docker compose exec -T db pg_isready -U postgres && break || sleep 3
          done

      # -- Verify backend is accessible --------------------------------------
      - name: Verify Backend is Accessible
        run: |
          echo "Waiting for backend on port 3000..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/v1/pacients && break || sleep 3
          done

      # -- Set up Java 17 (matches Karate test stack requirements) ----------
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # -- Clone Karate automation repository --------------------------------
      - name: Clone Karate QA Repository
        run: git clone https://github.com/ElyRiven/HEALTH_TECH_QA_KARATE.git

      # -- Run Karate API tests ----------------------------------------------
      # Executes all 12 API scenarios. Any scenario failure exits non-zero
      # and stops the pipeline.
      - name: Run Karate API Tests
        working-directory: ./HEALTH_TECH_QA_KARATE
        run: |
          chmod +x ./gradlew
          ./gradlew clean test

      # -- Upload Karate report as artifact (14 days, always) ---------------
      # Retained even on failure so API test regressions can be investigated.
      - name: Upload Karate API Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: karate-api-report
          path: HEALTH_TECH_QA_KARATE/build/karate-reports/
          retention-days: 14

  # ============================================================================
  # JOB 4 — K6 PERFORMANCE TESTS
  # ============================================================================
  # Clones the K6 QA repository and runs load tests against the backend API.
  # The test environment (PostgreSQL + backend) is spun up via docker-compose
  # using the Docker image published in the docker-build job. The K6 binary
  # with the xk6-dashboard extension is downloaded from the official release
  # assets (v0.8.1). Three load scripts are executed; threshold/check failures
  # are tolerated (only execution errors stop the pipeline). Reports generated
  # in results/ are uploaded as artifacts retained 14 days.
  # ============================================================================
  k6-test:
    name: "K6 Performance Tests"
    needs: [docker-build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read # Read repository source code

    steps:
      # -- Checkout main repository (provides docker-compose.yml) ------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -- Create .env file for docker-compose test environment --------------
      # DB_HOST=db and DB_PORT=5432 target the PostgreSQL container via the
      # internal Docker network. The backend is reachable from the runner
      # at localhost:3000 (mapped port) for K6 to target.
      - name: Create .env File
        run: |
          cat > .env << 'EOF'
          DB_USER=postgres
          DB_HOST=db
          DB_PASSWORD=${{ secrets.TEST_DB_PASSWORD }}
          DB_NAME=Triage
          DB_PORT=5432
          STAGE=test
          CORS_ORIGIN=http://localhost:5173,http://localhost:5174
          VITE_API_PROTOCOL=http
          VITE_API_HOST=localhost
          VITE_API_PORT=3000
          EOF

      # -- Login to Docker Hub to pull published images ----------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -- Start database and backend via docker compose ---------------------
      # Only the db and backend services are required for load tests.
      - name: Start Test Environment (docker compose up)
        run: docker compose up -d db backend

      # -- Verify database is healthy ----------------------------------------
      - name: Verify Database is Healthy
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          for i in $(seq 1 30); do
            docker compose exec -T db pg_isready -U postgres && break || sleep 3
          done

      # -- Verify backend is accessible --------------------------------------
      - name: Verify Backend is Accessible
        run: |
          echo "Waiting for backend on port 3000..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/v1/pacients && break || sleep 3
          done

      # -- Set up Node.js 24 (matches K6 project requirements) --------------
      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # -- Install K6 with xk6-dashboard extension --------------------------
      # Downloads the pre-built K6 binary (v1.6.1) bundled with the
      # xk6-dashboard extension (v0.8.1) from the official release assets.
      # The binary inside the archive is named 'xk6-dashboard'; it is installed
      # as 'k6' so all subsequent k6 commands work without modification.
      # This avoids compiling K6 from source.
      - name: Install K6 with xk6-dashboard Extension
        run: |
          wget -q https://github.com/grafana/xk6-dashboard/releases/download/v0.8.1/xk6-dashboard_v0.8.1_linux_amd64.tar.gz
          tar -xzf xk6-dashboard_v0.8.1_linux_amd64.tar.gz
          sudo mv xk6-dashboard_v0.8.1_linux_amd64/k6 /usr/local/bin/k6

      # -- Verify K6 installation -------------------------------------------
      # Must report: k6 v1.6.1 with github.com/grafana/xk6-dashboard v0.8.1
      - name: Verify K6 Installation
        run: k6 version

      # -- Clone K6 performance test repository ------------------------------
      - name: Clone K6 QA Repository
        run: git clone https://github.com/ElyRiven/HEALTH_TECH_QA_K6.git

      # -- Install K6 project npm dependencies --------------------------------
      - name: Install K6 Project Dependencies
        working-directory: ./HEALTH_TECH_QA_K6
        run: npm install

      # -- Run K6 load tests -------------------------------------------------
      # Runs all three load scripts defined in package.json. Threshold and
      # check failures (K6 exit code 99) are tolerated and do not stop the
      # pipeline — they represent measured performance data. Only real
      # execution errors (exit code != 0 and != 99) fail this step.
      - name: Run K6 Load Tests
        working-directory: ./HEALTH_TECH_QA_K6
        run: |
          run_k6() {
            npm run "$1"
            local EXIT=$?
            if [ $EXIT -ne 0 ] && [ $EXIT -ne 99 ]; then
              echo "::error::K6 script '$1' failed with exit code $EXIT"
              return $EXIT
            fi
            return 0
          }
          run_k6 test:load:createPatient
          run_k6 test:load:getPatient
          run_k6 test:load:getPatients

      # -- Upload K6 performance reports (14 days, always) ------------------
      # Reports are retained regardless of threshold outcomes so performance
      # trends can be reviewed over time.
      - name: Upload K6 Performance Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-performance-reports
          path: HEALTH_TECH_QA_K6/results/
          retention-days: 14

  # ============================================================================
  # JOB 5 — DEPLOY TO RENDER
  # ============================================================================
  # Triggers a redeployment of the backend service on Render via the
  # Render REST API (https://api.render.com/v1).
  #
  # WHY DIRECT API INSTEAD OF A THIRD-PARTY ACTION:
  #   This service is deployed as a Docker image pulled from Docker Hub.
  #   Third-party actions (e.g. JorgeLNJunior/render-deploy) send the current
  #   Git commit SHA as commitId when triggering the deploy. Render rejects
  #   this with HTTP 404 because Docker image services have no Git history
  #   on Render's side. A plain POST to /deploys (without commitId) is the
  #   correct call for Docker image services.
  #
  # FLOW:
  #   1. POST /deploys  — triggers Render to pull :latest from Docker Hub.
  #   2. Poll GET /deploys/{id} every 15 s until status is 'live'.
  #   3. Fail the job if the deploy reaches a terminal failure state.
  # ============================================================================
  deploy:
    name: "Deploy Backend to Render"
    needs: [karate-test, k6-test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      # -- Trigger deploy and poll until live ---------------------------------
      # Render pulls ${{ env.BACKEND_IMAGE }}:latest from Docker Hub.
      # The loop exits on 'live' (success) or any terminal failure status.
      - name: Deploy to Render
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          echo "Triggering deploy for service: $RENDER_SERVICE_ID"

          DEPLOY=$(curl -sf -X POST \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}')

          DEPLOY_ID=$(echo "$DEPLOY" | jq -r '.id')
          echo "Deploy triggered — ID: $DEPLOY_ID"

          echo "Waiting for deploy to go live..."
          for i in $(seq 1 40); do
            STATUS=$(curl -sf \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" \
              -H "Authorization: Bearer $RENDER_API_KEY" | jq -r '.status')

            echo "  [attempt $i] status: $STATUS"

            if [ "$STATUS" = "live" ]; then
              echo "Deploy successful — service is live."
              exit 0
            fi

            if [ "$STATUS" = "deactivated" ] || \
               [ "$STATUS" = "build_failed" ] || \
               [ "$STATUS" = "update_failed" ] || \
               [ "$STATUS" = "canceled" ]; then
              echo "::error::Deploy failed with status: $STATUS"
              exit 1
            fi

            sleep 15
          done

          echo "::error::Deploy timed out after 10 minutes."
          exit 1
